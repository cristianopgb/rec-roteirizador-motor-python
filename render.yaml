services:
  - type: web
    name: rec-roteirizador-motor-python
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_NAME
        value: REC Motor Python
      - key: APP_ENV
        value: production
      - key: LOG_LEVEL
        value: INFO
